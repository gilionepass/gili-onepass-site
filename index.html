<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>길리원패스 예상 견적 확인</title>
  <style>
    :root {
      --bg: #f1f5f3;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #cbd5e1;
      --primary: #17863d;
      --primary-dark: #136b31;
      --secondary: #177e79;
      --danger: #dc2626;
      --info: #1d4ed8;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 16px 48px;
    }

    .hero {
      text-align: center;
      margin-bottom: 22px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 800;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(203, 213, 225, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px 18px 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 145px 1fr;
      gap: 14px 16px;
      align-items: center;
    }

    .label {
      font-size: 15px;
      font-weight: 800;
      color: #0f172a;
    }

    .field {
      width: 100%;
    }

    select,
    input[type="date"] {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 16px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    select:focus,
    input[type="date"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(23, 134, 61, 0.12);
    }

    .hint {
      grid-column: 2 / 3;
      margin-top: -6px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .divider {
      margin: 12px 0 0;
      border-top: 1px dashed #d6dde6;
      padding-top: 12px;
    }

    .mix-inline {
      display: none;
    }

    .mix-inline.active {
      display: contents;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    button,
    .wa-link {
      appearance: none;
      border: none;
      border-radius: 16px;
      min-height: 52px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.12s ease, background 0.2s ease;
    }

    button:hover,
    .wa-link:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-wa {
      background: var(--secondary);
      color: white;
    }

    .error,
    .copied,
    .notice {
      display: none;
      margin-top: 16px;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.6;
    }

    .error {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }

    .copied {
      background: #ecfdf5;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .notice {
      background: #eff6ff;
      color: var(--info);
      border: 1px solid #bfdbfe;
    }

    .result {
      display: none;
      margin-top: 20px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 18px 16px;
    }

    .result h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .total-box {
      background: white;
      border: 1px solid #d9e2ea;
      border-radius: 16px;
      padding: 16px;
      font-size: 19px;
      font-weight: 800;
      color: #0f6b38;
    }

    .detail-card {
      margin-top: 14px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
    }

    .detail-card h3 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .detail-card p {
      margin: 6px 0;
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .english-box {
      margin-top: 14px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
    }

    .english-box h3 {
      margin: 0 0 10px;
      font-size: 17px;
    }

    .english-box pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.7;
      color: #334155;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hint {
        grid-column: 1 / -1;
      }

      .buttons {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 24px;
      }

      .card {
        padding: 18px 14px 20px;
      }
    }
  </style>
</head>

    function parseMonth(dateValue) {
      if (!dateValue) return null;
      return Number(dateValue.split("-")[1]);
    }

    function formatDateKorean(dateValue) {
      if (!dateValue) return "미선택";
      const [year, month, day] = dateValue.split("-");
      return `${year}년 ${Number(month)}월 ${Number(day)}일`;
    }

    function formatDateEnglish(dateValue) {
      if (!dateValue) return "Not selected";
      const date = new Date(dateValue + "T00:00:00");
      return date.toLocaleDateString("en-GB", {
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function formatK(value) {
      const rounded = Number.isInteger(value) ? value : Number(value.toFixed(1));
      return `${rounded}K IDR`;
    }

   function getVehicleCount(passengers) {
  if (passengers >= 1 && passengers <= 4) return 1;
  if (passengers >= 5 && passengers <= 8) return 2;
  if (passengers >= 9 && passengers <= 12) return 3;
  return 0;
}

    function getTransportTotal(pickup, dropoff, passengers) {
      const vehicleCount = getVehicleCount(passengers);
      const pickupSelected = pickup && pickup !== "미선택";
      const dropoffSelected = dropoff && dropoff !== "미선택";

      let base = 0;
      let lines = [];

    if (pickupSelected && dropoffSelected) {
  const pickupPrice = transportPrices[pickup]?.duo ?? 0;
  const dropoffPrice = transportPrices[dropoff]?.duo ?? 0;
  base = pickupPrice + dropoffPrice;
  lines.push(`🚐 픽업 ${pickup} ${pickupPrice}K IDR`);
  lines.push(`🚐 샌딩 ${dropoff} ${dropoffPrice}K IDR`);
} else if (pickupSelected) {
  const pickupPrice = transportPrices[pickup]?.single ?? 0;
  base = pickupPrice;
  lines.push(`🚐 픽업 ${pickup} ${pickupPrice}K IDR`);
} else if (dropoffSelected) {
  const dropoffPrice = transportPrices[dropoff]?.single ?? 0;
  base = dropoffPrice;
  lines.push(`🚐 샌딩 ${dropoff} ${dropoffPrice}K IDR`);
}

      return {
        total: base * vehicleCount,
        base,
        vehicleCount,
        lines
      };
    }

    function getFerryPriceByMonth(month, company, priceType) {
      return monthlyFerryPrices[month]?.[company]?.[priceType] ?? null;
    }

    function getIncludedTaxNoteForCompany(company) {
      if (company === "EKAJAYA") {
        return "항구세 50K 포함";
      }
      return "항구세 50K 미포함";
    }

    function validateDatesByTripType(tripType, arrivalDate, returnDate) {
      if (tripType === "ROUND") {
        if (!arrivalDate || !returnDate) {
          throw new Error("왕복은 입도 날짜와 출도 날짜를 모두 선택해주세요");
        }
        if (returnDate < arrivalDate) {
          throw new Error("출도 날짜는 입도 날짜보다 빠를 수 없습니다");
        }
      }

      if (tripType === "ARRIVAL_ONLY" && !arrivalDate) {
        throw new Error("빠당바이→길리 편도는 입도 날짜를 선택해주세요");
      }

      if (tripType === "RETURN_ONLY" && !returnDate) {
        throw new Error("길리→빠당바이 편도는 출도 날짜를 선택해주세요");
      }

      if (arrivalDate && returnDate && returnDate < arrivalDate) {
        throw new Error("출도 날짜는 입도 날짜보다 빠를 수 없습니다");
      }
    }

    function calculateBoatPrice({ ferryType, tripType, arrivalDate, returnDate, mixArrivalCompany, mixReturnCompany, passengers }) {
  const arrivalMonth = parseMonth(arrivalDate);
  const returnMonth = parseMonth(returnDate);

  let perPerson = 0;
  let label = "";
  let taxNote = "";
  let routeLine = "";
  let priceLine = "";
  let arrivalUnitPrice = 0;
  let returnUnitPrice = 0;

  if (!ferryType) {
    throw new Error("페리 회사를 선택해주세요");
  }

  if (ferryType !== "MIX") {
    if (tripType === "ROUND") {
      const arrivalRound = getFerryPriceByMonth(arrivalMonth, ferryType, "ROUND");
      const returnRound = getFerryPriceByMonth(returnMonth, ferryType, "ROUND");

      if (arrivalRound == null || returnRound == null) {
        throw new Error("선택한 월의 왕복 가격 정보가 없습니다");
      }

      arrivalUnitPrice = arrivalRound / 2;
      returnUnitPrice = returnRound / 2;
      perPerson = arrivalUnitPrice + returnUnitPrice;

      label = `${ferryDisplayNames[ferryType]} 왕복 티켓 1인`;
      routeLine = `입도 ${ferryDisplayNames[ferryType]} 출도 ${ferryDisplayNames[ferryType]}`;
      priceLine = `입도 ${ferryDisplayNames[ferryType]} 1인 가격 ${formatK(arrivalUnitPrice)} / 출도 ${ferryDisplayNames[ferryType]} 1인 가격 ${formatK(returnUnitPrice)}`;
      taxNote = getIncludedTaxNoteForCompany(ferryType);
    }

    if (tripType === "ARRIVAL_ONLY") {
      const departure = getFerryPriceByMonth(arrivalMonth, ferryType, "DEPARTURE");
      if (departure == null) throw new Error("선택한 월의 입도 편도 가격 정보가 없습니다");

      arrivalUnitPrice = departure;
      perPerson = departure;

      label = `${ferryDisplayNames[ferryType]} 빠당바이→길리 편도 1인`;
      routeLine = `입도 ${ferryDisplayNames[ferryType]}`;
      priceLine = `입도 ${ferryDisplayNames[ferryType]} 1인 가격 ${formatK(arrivalUnitPrice)}`;
      taxNote = ferryType === "EKAJAYA" ? "항구세 포함" : "항구세 50K 미포함";
    }

    if (tripType === "RETURN_ONLY") {
      const ret = getFerryPriceByMonth(returnMonth, ferryType, "RETURN");
      if (ret == null) throw new Error("선택한 월의 출도 편도 가격 정보가 없습니다");

      returnUnitPrice = ret;
      perPerson = ret;

      label = `${ferryDisplayNames[ferryType]} 길리→빠당바이 편도 1인`;
      routeLine = `출도 ${ferryDisplayNames[ferryType]}`;
      priceLine = `출도 ${ferryDisplayNames[ferryType]} 1인 가격 ${formatK(returnUnitPrice)}`;
      taxNote = ferryType === "EKAJAYA" ? "항구세 포함" : "항구세 50K 미포함";
    }
  } else {
    if (tripType === "ROUND") {
      if (!mixArrivalCompany || !mixReturnCompany) {
        throw new Error("믹스티켓은 입도 페리회사와 출도 페리회사를 모두 선택해주세요");
      }

      const arrMix = getFerryPriceByMonth(arrivalMonth, mixArrivalCompany, "MIX");
      const retMix = getFerryPriceByMonth(returnMonth, mixReturnCompany, "MIX");

      if (arrMix == null || retMix == null) {
        throw new Error("선택한 월의 믹스티켓 가격 정보가 없습니다");
      }

      arrivalUnitPrice = arrMix;
      returnUnitPrice = retMix;
      perPerson = arrMix + retMix;

      label = `믹스티켓 왕복 1인`;
      routeLine = `입도 ${ferryDisplayNames[mixArrivalCompany]} 출도 ${ferryDisplayNames[mixReturnCompany]}`;
      priceLine = `입도 ${ferryDisplayNames[mixArrivalCompany]} 1인 가격 ${formatK(arrivalUnitPrice)} / 출도 ${ferryDisplayNames[mixReturnCompany]} 1인 가격 ${formatK(returnUnitPrice)}`;
      taxNote = getMixTaxNote(mixArrivalCompany, mixReturnCompany);
    }

    if (tripType === "ARRIVAL_ONLY") {
      if (!mixArrivalCompany) {
        throw new Error("믹스티켓 편도는 입도 페리회사를 선택해주세요");
      }

      const dep = getFerryPriceByMonth(arrivalMonth, mixArrivalCompany, "DEPARTURE");
      if (dep == null) throw new Error("선택한 월의 입도 편도 가격 정보가 없습니다");

      arrivalUnitPrice = dep;
      perPerson = dep;

      label = `${ferryDisplayNames[mixArrivalCompany]} 빠당바이→길리 편도 1인`;
      routeLine = `입도 ${ferryDisplayNames[mixArrivalCompany]}`;
      priceLine = `입도 ${ferryDisplayNames[mixArrivalCompany]} 1인 가격 ${formatK(arrivalUnitPrice)}`;
      taxNote = mixArrivalCompany === "EKAJAYA" ? "입도 항구세 30K 포함" : "항구세 50K 미포함";
    }

    if (tripType === "RETURN_ONLY") {
      if (!mixReturnCompany) {
        throw new Error("믹스티켓 편도는 출도 페리회사를 선택해주세요");
      }

      const ret = getFerryPriceByMonth(returnMonth, mixReturnCompany, "RETURN");
      if (ret == null) throw new Error("선택한 월의 출도 편도 가격 정보가 없습니다");

      returnUnitPrice = ret;
      perPerson = ret;

      label = `${ferryDisplayNames[mixReturnCompany]} 길리→빠당바이 편도 1인`;
      routeLine = `출도 ${ferryDisplayNames[mixReturnCompany]}`;
      priceLine = `출도 ${ferryDisplayNames[mixReturnCompany]} 1인 가격 ${formatK(returnUnitPrice)}`;
      taxNote = mixReturnCompany === "EKAJAYA" ? "출도 항구세 포함" : "출도 항구세 20K 별도 납부";
    }
  }

  return {
    perPerson,
    total: perPerson * passengers,
    label,
    taxNote,
    routeLine,
    priceLine,
    arrivalUnitPrice,
    returnUnitPrice
  };
}

    function getMixTaxNote(arrivalCompany, returnCompany) {
  if (arrivalCompany === "EKAJAYA" && returnCompany === "EKAJAYA") {
    return "에카자야 전 구간 항구세 포함";
  }

  const notes = [];

  if (arrivalCompany === "EKAJAYA") {
    notes.push("입도 항구세 30K 포함");
  }

  if (returnCompany === "EKAJAYA") {
    notes.push("출도 항구세 포함");
  } else {
    notes.push("출도 항구세 20K 별도 납부");
  }

  return notes.join(" / ");
}

    function getDateRangeText(tripType, arrivalDate, returnDate) {
      if (tripType === "ROUND") {
        return `${formatDateKorean(arrivalDate)} ~ ${formatDateKorean(returnDate)}`;
      }
      if (tripType === "ARRIVAL_ONLY") {
        return `${formatDateKorean(arrivalDate)}`;
      }
      return `${formatDateKorean(returnDate)}`;
    }

    function getCompanySummaryName(ferryType, mixArrivalCompany, mixReturnCompany, tripType) {
      if (ferryType !== "MIX") return ferryDisplayNames[ferryType];
      if (tripType === "ROUND") {
        return `믹스티켓 입도 ${ferryDisplayNames[mixArrivalCompany]} 출도 ${ferryDisplayNames[mixReturnCompany]}`;
      }
      if (tripType === "ARRIVAL_ONLY") {
        return ferryDisplayNames[mixArrivalCompany];
      }
      return ferryDisplayNames[mixReturnCompany];
    }

    function buildEnglishMessage(data) {
      return [
        "Hello, I would like to check the estimated price",
        "",
        `Product: Gili Ferry Ticket + Pick-up + Drop-off`,
        `Passengers: ${data.passengers}`,
        `Trip Type: ${data.tripType}`,
        `Ferry Info: ${data.ferryInfo}`,
        `Arrival Date: ${data.arrivalDate}`,
        `Return Date: ${data.returnDate}`,
        `Pick-up Location: ${data.pickup}`,
        `Drop-off Location: ${data.dropoff}`,
        `Estimated Total: ${data.total}`,
        `Tax Note: ${data.taxNote}`,
        "",
        "Please confirm the availability and booking details"
      ].join("\n");
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        showCopied("영어 견적 내용이 자동 복사되었습니다");
      } catch (e) {
        showNotice("자동 복사에 실패했습니다 아래 영어 상담 문구를 직접 복사해주세요");
      }
    }

    function updateWhatsappLink() {
      const text = latestEnglishMessage || "Hello, I would like to check the estimated price";
      waBtnEl.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(text)}`;
    }

    function setTripTypeUI() {
  const tripType = tripTypeEl.value;

  if (tripType === "ARRIVAL_ONLY") {
    returnDateEl.disabled = true;
    returnDateEl.value = "";

    arrivalDateEl.disabled = false;

    pickupLocationEl.disabled = false;
    dropoffLocationEl.disabled = true;
    dropoffLocationEl.value = "미선택";
  } else if (tripType === "RETURN_ONLY") {
    arrivalDateEl.disabled = true;
    arrivalDateEl.value = "";

    returnDateEl.disabled = false;

    pickupLocationEl.disabled = true;
    pickupLocationEl.value = "미선택";
    dropoffLocationEl.disabled = false;
  } else {
    arrivalDateEl.disabled = false;
    returnDateEl.disabled = false;

    pickupLocationEl.disabled = false;
    dropoffLocationEl.disabled = false;
  }
}

    function setMixUI() {
      const isMix = ferryTypeEl.value === "MIX";
      [mixArrivalLabelEl, mixArrivalFieldEl, mixReturnLabelEl, mixReturnFieldEl].forEach((el) => {
        el.classList.toggle("active", isMix);
      });

      if (!isMix) {
        mixArrivalCompanyEl.value = "";
        mixReturnCompanyEl.value = "";
      }
    }

    function calculateEstimate() {
      hideError();
      hideNotice();

      const passengers = Number(passengersEl.value);
      const tripType = tripTypeEl.value;
      const ferryType = ferryTypeEl.value;
      const arrivalDate = arrivalDateEl.value;
      const returnDate = returnDateEl.value;
      const pickup = pickupLocationEl.value;
      const dropoff = dropoffLocationEl.value;
      const mixArrivalCompany = mixArrivalCompanyEl.value;
      const mixReturnCompany = mixReturnCompanyEl.value;

      validateDatesByTripType(tripType, arrivalDate, returnDate);

      const boat = calculateBoatPrice({
        ferryType,
        tripType,
        arrivalDate,
        returnDate,
        mixArrivalCompany,
        mixReturnCompany,
        passengers
      });

      const transport = getTransportTotal(pickup, dropoff, passengers);
      const total = boat.total + transport.total;

      resultTotalEl.textContent = `예상 총액 ${formatK(total)}`;

      const dateRangeText = getDateRangeText(tripType, arrivalDate, returnDate);
      const companySummary = getCompanySummaryName(ferryType, mixArrivalCompany, mixReturnCompany, tripType);

      const lines = [];
lines.push(`${dateRangeText}`);
lines.push("");
lines.push(`📍${boat.label}`);
lines.push(`${boat.routeLine}`);
lines.push(`${boat.priceLine}`);
lines.push(`${formatK(boat.perPerson)} × ${passengers}명 = ${formatK(boat.total)}`);

if (boat.taxNote) {
  lines.push(`${boat.taxNote}`);
}

lines.push("");

transport.lines.forEach((line) => {
  lines.push(line);
  lines.push("");
});

lines.push(`✅ ${companySummary} ${passengers}인 총합`);
lines.push(`❗ TOTAL ${formatK(total)}`);

      detailTextEl.textContent = lines.join("\n");


      const englishMessage = buildEnglishMessage({
        passengers,
        tripType: tripTypeEnglishNames[tripType],
        ferryInfo:
          ferryType !== "MIX"
            ? `${ferryEnglishNames[ferryType] || "-"}`
            : tripType === "ROUND"
              ? `Mix Ticket Arrival ${ferryEnglishNames[mixArrivalCompany] || "-"} Return ${ferryEnglishNames[mixReturnCompany] || "-"}`
              : tripType === "ARRIVAL_ONLY"
                ? `${ferryEnglishNames[mixArrivalCompany] || "-"}`
                : `${ferryEnglishNames[mixReturnCompany] || "-"}`,
        arrivalDate: formatDateEnglish(arrivalDate),
        returnDate: formatDateEnglish(returnDate),
        pickup: locationEnglishNames[pickup] || "Not Selected",
        dropoff: locationEnglishNames[dropoff] || "Not Selected",
        total: formatK(total),
        taxNote: boat.taxNote
      });

      latestEnglishMessage = englishMessage;
      englishPreviewEl.textContent = englishMessage;
      updateWhatsappLink();
      resultBoxEl.style.display = "block";
      copyToClipboard(englishMessage);
    }

    ferryTypeEl.addEventListener("change", setMixUI);
    tripTypeEl.addEventListener("change", setTripTypeUI);

    arrivalDateEl.addEventListener("change", () => {
      if (tripTypeEl.value === "ROUND" && arrivalDateEl.value) {
        returnDateEl.value = arrivalDateEl.value;
        returnDateEl.min = arrivalDateEl.value;
      }
    });

    returnDateEl.addEventListener("change", () => {
      if (arrivalDateEl.value && returnDateEl.value && returnDateEl.value < arrivalDateEl.value) {
        showError("출도 날짜는 입도 날짜보다 빠를 수 없습니다");
        returnDateEl.value = arrivalDateEl.value;
      } else {
        hideError();
      }
    });

    estimateBtnEl.addEventListener("click", () => {
      try {
        calculateEstimate();
      } catch (error) {
        resultBoxEl.style.display = "none";
        showError(error.message || "견적 계산 중 오류가 발생했습니다");
      }
    });

    waBtnEl.addEventListener("click", (event) => {
      if (!latestEnglishMessage) {
        event.preventDefault();
        try {
          calculateEstimate();
        } catch (error) {
          resultBoxEl.style.display = "none";
          showError(error.message || "먼저 예상견적을 확인해주세요");
        }
      } else {
        updateWhatsappLink();
      }
    });

    populateLocations();
    setMixUI();
    setTripTypeUI();
    updateWhatsappLink();

[arrivalDateEl, returnDateEl].forEach((el) => {
  el.addEventListener("click", () => {
    if (el.showPicker) el.showPicker();
  });
});

  </script>
</body>
</html>
